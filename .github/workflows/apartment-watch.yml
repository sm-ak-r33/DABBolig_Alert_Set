name: Apartment Watch

on:
  workflow_dispatch:

  # schedule:
  #   # Monday-Friday, every 5 minutes from 07:00 to 23:55 Europe/Copenhagen time
  #   - cron: "*/5 7-23 * * 1-5"
  #     timezone: "Europe/Copenhagen"

concurrency:
  group: apartment-watch
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-apartments:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Restore previous alert state
        uses: actions/cache/restore@v4
        with:
          path: .state
          key: apartment-state-${{ github.run_id }}
          restore-keys: |
            apartment-state-

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Check apartment availability
        env:
          APARTMENT_URL: https://dab-lejerbo.dk/boligsoegende/tidsbegraensede-boliger/
          MIN_POSTCODE: "1000"
          MAX_POSTCODE: "2999"
          FORGET_AFTER_MISSING_RUNS: "3"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          # TEST ONLY:
          # POSTCODE_TEST: "1"
          # FORCE_INITIAL_SNAPSHOT: "1"
        run: npm run check

      - name: Save alert state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .state
          key: apartment-state-${{ github.run_id }}

      

